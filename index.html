<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="Description" content="Digital Rain Animation" />
    <link rel="stylesheet" type="text/css" media="screen" href="/src/style.css" />
    <title>Digital Rain Animation</title>
    <link
      rel="icon"
      href="https://upload.wikimedia.org/wikipedia/commons/thumb/e/e6/Xmatrix.png/300px-Xmatrix.png"
    />
  </head>
  <body>
    <div class="menu">
      <h1 id="title">DIGITAL RAIN ANIMATION</h1>
      <br />
      <label for="disco" id="discoLabel">
        Disco:
        <input
          type="checkbox"
          id="disco"
          name="discoOption"
          value="Disco"
        />
      </label>
      <br />
      <label for="colors" id="colorsLabel">Choose a color:</label>
      <select name="colors" id="colors">
        <option value="green">Green</option>
        <option value="red">Red</option>
        <option value="yellow">Yellow</option>
        <option value="blue">Blue</option>
        <option value="orange">Orange</option>
        <option value="pink">Pink</option>
        <option value="cyan">Cyan</option>
        <option value="random">Random</option>
      </select>
      <br />
      <label for="directions" id="directionsLabel">Choose a direction:</label>
      <select name="directions" id="directions">
        <option value="south">South</option>
        <option value="north">North</option>
        <option value="east">East</option>
        <option value="west">West</option>
      </select>
      <br />
      <div class="frameCount">
        <label for="frameCount">Disco Frame Count (1-100):</label>
        <input
          type="number"
          id="frameCount"
          name="frameCount"
          min="1"
          max="100"
          value="1"
        />
      </div>

      <br />
      <button class="button" id="button3">
        All 4 Directions: OFF
      </button>
      <button class="button" id="button">
        Start Animation
      </button>
      <button class="button" id="button2">
        Move Square Mode
      </button>
      <button class="button" id="button4">
        Help
      </button>

      <footer id="footer">
        <p>
          Author: Matt Bunch<br />
          <span>2020</span>
        </p>
      </footer>
    </div>

    <canvas id="myCanvas"></canvas>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
